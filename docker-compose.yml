services:
  # ── Infrastructure (pulled images, no code of ours) ──────────────────────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    container_name: redpanda
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --default-log-level=info
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092" # optional host access to the broker
    healthcheck:
      test: [ "CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'" ]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379" # optional host access to Redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 12

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: redpanda-console
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8081:8080" # web UI to watch messages: http://localhost:8081
    depends_on:
      redpanda:
        condition: service_healthy

  flower:
    image: mher/flower:2.0
    container_name: flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "8082:5555" # Celery UI: http://localhost:8082
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80" # the only client entrypoint: http://localhost:8080, Docker forwards 8080 to 80
    depends_on:
      - api-server
      - monitor-server

  # ── Our services (built from source) ─────────────────────────────────────
  api-server:
    build: ./api-server
    container_name: api-server
    env_file: .env.example
    depends_on:
      redpanda:
        condition: service_healthy

  # A second HTTP service, reachable only via the /monitor prefix.
  # No Kafka — it exists to show nginx path-based routing.
  monitor-server:
    build: ./monitor-server
    container_name: monitor-server

  worker-server:
    build: ./worker-server
    container_name: worker-server
    env_file: .env.example
    depends_on:
      redpanda:
        condition: service_healthy

  notification-server:
    build: ./notification-server
    container_name: notification-server
    env_file: .env.example
    depends_on:
      redpanda:
        condition: service_healthy

  celery-worker:
    build: ./task-server
    container_name: celery-worker
    command: [ "celery", "-A", "tasks", "worker", "--loglevel=info" ]
    env_file: .env.example
    depends_on:
      redis:
        condition: service_healthy

  celery-beat:
    build: ./task-server
    container_name: celery-beat
    command: [ "celery", "-A", "tasks", "beat", "--loglevel=info" ]
    env_file: .env.example
    depends_on:
      redis:
        condition: service_healthy

events {}

http {
    # Each backend service is its own upstream pool.
    upstream api {
        server api-server:8000;
        # To load-balance across replicas, scale api-server and add entries:
        #   docker compose up --scale api-server=3
        # nginx will round-robin across the resolved instances.
    }

    upstream monitor {
        server monitor-server:9000;
    }

    server {
        listen 80; # this listens on port 80 from Docker's forwared msg from 8080 to 80

        # nginx routes by longest-matching path prefix.
        # /api/*     → api-server ; /monitor/* → monitor-server.
        # The request URI is passed through unchanged (proxy_pass has no path),
        # so each service owns its own prefix in its own routes.

        location /api {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /monitor {
            proxy_pass http://monitor;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Anything else matches no location → nginx replies 404 itself,
        # without ever touching a backend.
    }
}
